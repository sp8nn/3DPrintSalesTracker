<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Print Sales Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>3D Print Sales Tracker</h1>

        <div class="summary-box">
            <h2>Total Revenue</h2>
            <p id="totalRevenue">$0.00</p>
        </div>

        <div class="form-box">

            <h2>Add Sale</h2>

            <form id="saleForm">

                <label>Date</label>
                <input type="date" id="saleDate" required>

                <label>Item Name</label>
                <input type="text" id="itemName" placeholder="Example: Keychain" required>

                <label>Price</label>
                <input type="number" id="price" step="0.01" placeholder="Example: 5.00" required>

                <label>Quantity</label>
                <input type="number" id="quantity" placeholder="Example: 2" required>

                <button type="submit">Add Sale</button>

            </form>

        </div>

        <div class="table-box">

            <h2>Sales History</h2>

            <table>

                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="salesTableBody">

                </tbody>

            </table>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
